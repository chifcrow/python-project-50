[tool.poetry]
name = "hexlet-code"
version = "0.1.0"
description = "project 50"
authors = ["lazer"]
readme = "README.md"
packages = [
  { include = "hexlet_code" },
]

[tool.poetry.dependencies]
python = "^3.10"
pyyaml = "^6.0"

[tool.poetry.dev-dependencies]
pytest = "^8.1.1"
coverage = "^6.5.0"
pytest-cov = "^5.0.0"

[tool.poetry.scripts]
gendiff = "hexlet_code.scripts.cli:main"

[tool.poetry.group.dev.dependencies]
pytest = "^8.1.1"

[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"